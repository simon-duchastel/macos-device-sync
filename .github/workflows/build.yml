name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Verify app was created
        run: |
          test -d "build/MacOsDeviceSync.app" && echo "Build successful!"
